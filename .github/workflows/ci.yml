name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy scikit-learn pytest tenseal cryptography faiss-cpu psutil
      - name: Run system tests
        run: python -m pytest tests -q
      - name: Syntax-check experiment and test modules
        run: python -m compileall -q system tests
