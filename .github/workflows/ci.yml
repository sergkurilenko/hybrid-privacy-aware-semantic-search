name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install numpy scipy scikit-learn pytest tenseal cryptography faiss-cpu
      - name: Run system tests
        run: python -m pytest tests -q
      - name: Syntax-check experiment and test modules
        run: python -m compileall -q system tests
